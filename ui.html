<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      gap: 16px;
    }
    h2 { font-size: 16px; font-weight: 600; color: #fff; }
    p { font-size: 12px; color: #888; line-height: 1.5; }
    textarea {
      flex: 1;
      min-height: 200px;
      background: #2a2a2a;
      border: 1px solid #404040;
      border-radius: 8px;
      color: #e0e0e0;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      padding: 12px;
      resize: none;
      outline: none;
    }
    textarea:focus { border-color: #666; }
    textarea::placeholder { color: #555; }
    .btn-row { display: flex; gap: 8px; }
    button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #fff; color: #000; }
    .btn-secondary { background: #333; color: #aaa; }
    .btn-file {
      background: #2a2a2a;
      color: #aaa;
      border: 1px dashed #555;
      font-weight: 500;
    }
    #status {
      font-size: 12px;
      color: #888;
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #status.error { color: #f87171; }
    #status.success { color: #4ade80; }
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid #555;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div>
    <h2>Pen to Figma</h2>
    <p>Paste .pen JSON data or load from a file. All screens will be created on the current Figma page.</p>
  </div>

  <button class="btn-file" onclick="document.getElementById('fileInput').click()">
    Load from file...
  </button>
  <input type="file" id="fileInput" accept=".json,.pen">

  <textarea id="data" placeholder='Paste .pen JSON here... (array of nodes or {"children": [...]})' spellcheck="false"></textarea>

  <div id="status"></div>

  <div class="btn-row">
    <button class="btn-secondary" onclick="parent.postMessage({pluginMessage: {type: 'cancel'}}, '*')">
      Cancel
    </button>
    <button class="btn-primary" id="importBtn" onclick="doImport()">
      Import to Figma
    </button>
  </div>

  <script>
    const textarea = document.getElementById('data');
    const statusEl = document.getElementById('status');
    const importBtn = document.getElementById('importBtn');
    const fileInput = document.getElementById('fileInput');

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        textarea.value = ev.target.result;
        statusEl.textContent = `Loaded ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
        statusEl.className = '';
      };
      reader.readAsText(file);
    });

    function doImport() {
      const data = textarea.value.trim();
      if (!data) {
        statusEl.textContent = 'Paste or load data first';
        statusEl.className = 'error';
        return;
      }
      importBtn.disabled = true;
      statusEl.innerHTML = '<span class="spinner"></span> Starting import...';
      statusEl.className = '';
      parent.postMessage({ pluginMessage: { type: 'import', data } }, '*');
    }

    window.onmessage = (e) => {
      const msg = e.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'status') {
        statusEl.innerHTML = '<span class="spinner"></span> ' + msg.message;
        statusEl.className = '';
      }
      if (msg.type === 'done') {
        statusEl.textContent = '✓ ' + msg.message;
        statusEl.className = 'success';
        importBtn.disabled = false;
      }
      if (msg.type === 'error') {
        statusEl.textContent = '✗ ' + msg.message;
        statusEl.className = 'error';
        importBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
